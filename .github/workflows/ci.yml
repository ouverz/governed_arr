name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate dbt project
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SNOWFLAKE_ACCOUNT: placeholder-account
      SNOWFLAKE_USER: placeholder_user
      SNOWFLAKE_PASSWORD: placeholder_password
      SNOWFLAKE_SCHEMA: DBT_CI_PARSE

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure CI profile
        run: cp profiles.example.yml profiles.yml

      - name: Build dbt image
        run: docker compose build

      - name: Parse DuckDB and Snowflake targets
        run: |
          docker compose run --rm dbt parse
          docker compose run --rm dbt parse --target snowflake_dev
          docker compose run --rm dbt parse --target prod

      - name: Create empty relations for unit-test schema inference
        run: docker compose run --rm dbt run --empty

      - name: Run focused unit tests
        run: docker compose run --rm dbt test --select resource_type:unit_test

      - name: Download latest main manifest
        id: state
        shell: bash
        run: |
          mkdir -p ci-state
          run_id="$(gh run list \
            --workflow ci.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')"

          if [[ -n "$run_id" ]] && gh run download "$run_id" \
            --name dbt-main-manifest \
            --dir ci-state; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No successful main manifest is available; skipping state selection."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build modified nodes and dependencies
        if: steps.state.outputs.available == 'true'
        run: docker compose run --rm dbt build --select "+state:modified+" --state ci-state

      - name: Run complete local build and data tests
        run: docker compose run --rm dbt build

      - name: Validate semantic contract
        run: make semantic-validate

      - name: Publish main manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dbt-main-manifest
          path: target/manifest.json
          retention-days: 30
          if-no-files-found: error
