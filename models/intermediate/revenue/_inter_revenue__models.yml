version: 2

models:
  - name: int_subscription_arr_lines
    description: >
      One row per effective-dated subscription line with product-owned ARR
      eligibility, pricing detail, amendment lineage, and annualization.
    columns:
      - name: subscription_line_id
        data_tests: [not_null, unique]
      - name: subscription_id
        data_tests: [not_null]
      - name: account_id
        data_tests: [not_null]
      - name: product_id
        data_tests: [not_null]
      - name: is_arr_eligible
        data_tests: [not_null]
      - name: line_arr
        data_tests: [not_null]
